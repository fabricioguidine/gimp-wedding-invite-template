# Estrutura visual do convite — dimensões, fontes, dobras.
# Conteúdo (nomes, datas, paleta) está em invite.yaml.

canvas:
  width_px: 3543      # ~30cm @ 300 DPI
  height_px: 1772     # ~15cm @ 300 DPI
  dpi: 300
  background_color: "#FFFFFF"  # branco

# Tri-fold em sanfona (Z-fold).
# Ordem dos painéis da esquerda pra direita no canvas aberto.
# Pra Z-fold a capa geralmente fica no painel da direita; ajuste se quiser.
fold:
  type: "sanfona"
  panel_order:
    - madrinha
    - save_the_date
    - cover
  guides_vertical_pct:
    - 33.3333
    - 66.6666

borders:
  stroke_width_px: 2
  inner_margin_px: 118    # ~1cm @ 300 DPI
  color: "#9C7E3E"        # dourado oliva (mesma cor dos textos, estilo PDF)
  raster: true            # se false, não cria a layer raster (só paths)
  as_paths: true          # cria Gimp.Path editáveis (diálogo Paths do GIMP)

fonts:
  # Cormorant Garamond instalado via tools\install_fonts.ps1 (Google Fonts).
  # Estilo do PDF: nomes do casal em itálico, demais em regular/bold.
  script:                                # itálico decorativo (verso, body)
    family: "Cormorant Garamond Italic"
    fallback: "Georgia Itálico"
  script_bold:                           # itálico bold (títulos)
    family: "Cormorant Garamond Bold Italic"
    fallback: "Georgia Negrito Itálico"
  serif:                                 # corpo regular
    family: "Cormorant Garamond Regular"
    fallback: "Georgia Regular"
  bold:                                  # bold reto (caixa-alta dos pais)
    family: "Cormorant Garamond Bold"
    fallback: "Georgia Negrito"

panels:
  # Painel da capa externa (cover-pos no convite_externo): só o monograma
  cover:
    monogram_font: script
    monogram_size_px: 170
    text_color: "#9C7E3E"

  # Painel central do convite_externo: verso bíblico (back cover quando dobrado).
  # Reaproveita a posição "madrinha" no canvas externo.
  verse:
    text_font: script
    text_size_px: 38
    ref_font: bold
    ref_size_px: 28

  # Painel save_the_date-pos no convite_interno
  save_the_date:
    title_text: "Salve a Data"
    title_font: script
    title_size_px: 95
    invitation_font: bold
    invitation_size_px: 26
    body_font: serif
    body_size_px: 28
    body_wrap_chars: 50
    calendar:
      cell_size_px: 80
      header_size_px: 36
      day_size_px: 40
      highlight_radius_px: 36
      highlight_stroke_px: 3
      weekday_labels:
        - "D"
        - "S"
        - "T"
        - "Q"
        - "Q"
        - "S"
        - "S"

  # Painel madrinha-pos no convite_interno (agora pais)
  parents:
    blessing_font: bold
    blessing_size_px: 28
    name_font: bold
    name_size_px: 22
    column_gap_px: 30

  # Painel cover-pos no convite_interno (agora recepção + RSVP)
  reception_rsvp:
    title_font: bold
    title_size_px: 30
    body_font: serif
    body_size_px: 24
    rsvp_size_px: 18

  # Mantido para uso opcional (não renderizado por default no novo layout).
  madrinha:
    title_font: script
    title_size_px: 110
    body_font: serif
    body_size_px: 32
    body_wrap_chars: 38
    palette:
      circle_radius_px: 60
      circle_spacing_px: 70
