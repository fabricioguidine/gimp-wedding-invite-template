# wedding-pages — visual structure (tri-fold leaflet, 2 sides per variant).
# Same template as wedding-bridesmaid, applied to the kids (pajem / daminha).
# Both variants are single-role, so interno.middle only needs `single`.

canvas:
  width_px: 3390      # A4-landscape printable width  (297mm - 2*5mm @ 300 DPI)
  height_px: 2362     # A4-landscape printable height (210mm - 2*5mm @ 300 DPI)
  dpi: 300
  # Canvas matches the A4 printable area so the A4 export sits with EQUAL 5mm
  # margins on all four sides (no distortion). Panels are 3390/3 wide x 2362 tall.
  background_color: "#FFFFFF"

# Olive gold — matches the rest of the suite.
text_color: "#9C7E3E"

fold:
  type: "sanfona"
  panel_order:
    - back_cover
    - middle
    - front_cover
  guides_vertical_pct:
    - 33.3333
    - 66.6666

borders:
  stroke_width_px: 2
  inner_margin_px: 118
  color: "#9C7E3E"
  raster: true
  as_paths: true

fonts:
  script:
    family: "Cormorant Garamond Italic"
    fallback: "Georgia Italic"
  script_bold:
    family: "Cormorant Garamond Bold Italic"
    fallback: "Georgia Bold Italic"
  serif:
    family: "Cormorant Garamond Regular"
    fallback: "Georgia"
  bold:
    family: "Cormorant Garamond Bold"
    fallback: "Georgia Bold"

# External side (visible when folded) — front_cover faces out, back_cover wraps.
externo:
  front_cover:                # cover art + title + couple subtitle (distributed evenly)
    title_size_px: 96
    subtitle_size_px: 100
  middle:                     # calendar + ceremony info
    weekday_size_px: 94
    date_size_px: 56
    arrival_size_px: 51         # floor: no text smaller than the Sua Missão body (51)
    venue_size_px: 51
    address_size_px: 51
    calendar:
      cell_size_px: 80
      header_size_px: 51
      day_size_px: 54
      highlight_radius_px: 36
      highlight_stroke_px: 3
      weekday_labels: ["D", "S", "T", "Q", "Q", "S", "S"]   # PT Dom-Sáb
  back_cover:                 # logo (or empty if no logo asset)
    logo_padding_px: 50

# Internal side (after unfolding) — three panels of content.
interno:
  back_cover:                 # convite (missão)
    title_size_px: 100
    body_size_px: 51
    body_wrap_chars: 30         # widened with the font so the block keeps its height
    highlight_size_px: 72       # "Aceita ser nosso Pajem?" em destaque (kept — already big)
    highlight_wrap_chars: 16
    verse_size_px: 51           # floor at Sua Missão body size
    verse_wrap_chars: 30
    ref_size_px: 51
  middle:
    # single — one child role: title + body + outfit palette + names.
    # role_title_size_px is smaller than bridesmaid (120 vs 140) because the
    # child roles are two words ("Flower Girl", "Ring Bearer", "Bear Bearer").
    single:
      role_title_size_px: 120
      body_size_px: 56
      body_wrap_chars: 32       # widened with the font (fewer, wider lines)
      palette_subtitle_size_px: 62
      color_label_size_px: 51   # floor at Sua Missão body size
      palette:
        circle_radius_px: 60
        circle_spacing_px: 110  # labels are stacked (1 word/line), so swatches sit naturally
  front_cover:                # tips block ("Tips for the big day")  (body +34%)
    title_size_px: 100
    body_size_px: 56
    icon_size_px: 130

background_image:
  opacity_pct: 18
  scale_mode: "cover"
