# wedding-groomsman-invite — visual structure (tri-fold, 2 sides).
# Identical to wedding-bridesmaid-invite — only content.yaml differs.

canvas:
  width_px: 3543
  height_px: 1772
  dpi: 300
  background_color: "#F5EDE0"

text_color: "#9C7E3E"

fold:
  type: "sanfona"
  panel_order:
    - back_cover
    - middle
    - front_cover
  guides_vertical_pct:
    - 33.3333
    - 66.6666

borders:
  stroke_width_px: 2
  inner_margin_px: 118
  color: "#9C7E3E"
  raster: true
  as_paths: true

fonts:
  script:
    family: "Cormorant Garamond Italic"
    fallback: "Georgia Italic"
  script_bold:
    family: "Cormorant Garamond Bold Italic"
    fallback: "Georgia Bold Italic"
  serif:
    family: "Cormorant Garamond Regular"
    fallback: "Georgia"
  bold:
    family: "Cormorant Garamond Bold"
    fallback: "Georgia Bold"

externo:
  front_cover:
    title_size_px: 140
    title_top_padding_px: 80
    subtitle_size_px: 100
    subtitle_y_factor: 0.78
  middle:
    weekday_size_px: 70
    date_size_px: 42
    arrival_size_px: 36
    venue_size_px: 36
    address_size_px: 32
    calendar:
      cell_size_px: 80
      header_size_px: 36
      day_size_px: 40
      highlight_radius_px: 36
      highlight_stroke_px: 3
      weekday_labels: ["S", "M", "T", "W", "T", "F", "S"]
  back_cover:
    logo_padding_px: 50

interno:
  back_cover:
    title_size_px: 100
    body_size_px: 38
    body_wrap_chars: 24
    verse_size_px: 40
    verse_wrap_chars: 26
    ref_size_px: 28
  middle:
    role_title_size_px: 140
    body_size_px: 42
    body_wrap_chars: 24
    palette_subtitle_size_px: 50
    color_label_size_px: 40
    palette:
      circle_radius_px: 60
      circle_spacing_px: 70
  front_cover:
    title_size_px: 100
    body_size_px: 42
    icon_size_px: 130

background_image:
  opacity_pct: 18
  scale_mode: "cover"
