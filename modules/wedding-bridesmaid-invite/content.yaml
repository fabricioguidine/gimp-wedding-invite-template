# wedding-bridesmaid-invite — text content (English placeholders).

couple:
  bride: "Emily"
  groom: "James Thomas"

# Cover title on the external front_cover panel — short manual identifier.
cover:
  title: "Bridesmaid Manual"      # PT: "Manual das Madrinhas"

# Date data — drives the calendar highlight + the date-by-extenso text.
date:
  year: 2026
  month: 10                       # October
  day: 10
  month_name: "October"
  weekday_name: "Sunday"

ceremony:
  arrival_label: "Bridal party arrival"
  arrival_time: "16:30"
  venue: "Our Lady of the Rosary Parish Church"
  address: "123 Sample Avenue, Suite 230"

# Mission block — left panel of the internal side.
mission:
  title: "Your Mission"           # PT: "Sua Missão"
  body: |
    To pray, to bless, to advise, to walk beside, to encourage,
    to care, to bring joy, to love, and to witness our union and our
    love before God.

    We are sure that He is the one who placed you in our path.

    That is why we are so glad you accepted to be part of one of the
    most important days of our lives.
  verse:
    text: '"And above all these put on love, which binds everything together in perfect harmony."'
    reference: "Colossians 3:14"

# Role block — center panel of the internal side.
role:
  title: "Bridesmaid"
  body: "We want you to feel beautiful and confident on this special day. Your presence beside us makes the celebration even more meaningful."
  palette_subtitle: "Color palette - Bridesmaid"
  colors:
    - "#8B0008"
    - "#5C0808"
    - "#2D0606"
  color_names:
    - "Light wine"
    - "Wine"
    - "Dark wine"

# Tips block — right panel of the internal side.
tips:
  title: "Tips for the big day:"
  items:
    - icon: clock
      text: "Please arrive 30 minutes early. The ceremony is scheduled for 5:30 PM; please be there at 5:00 PM. We cannot afford to be late, okay?"
    - icon: camera
      text: "Take lots of photos and help us treasure this moment forever."
    - icon: glass
      text: "Enjoy yourself to the fullest!"
