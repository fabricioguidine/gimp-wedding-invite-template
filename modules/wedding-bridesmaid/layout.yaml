# wedding-bridesmaid — visual structure (tri-fold leaflet, 2 sides per variant).
# Z-fold / sanfona; panels left-to-right when open are:
#   back_cover  |  middle (calendar / role)  |  front_cover
# One layout serves all three variants (madrinha / padrinho / casal). The only
# per-variant difference is the interno middle panel: single-role vs split.

canvas:
  width_px: 3390      # A4-landscape printable width  (297mm - 2*5mm @ 300 DPI)
  height_px: 2362     # A4-landscape printable height (210mm - 2*5mm @ 300 DPI)
  dpi: 300
  # Canvas matches the A4 printable area so the A4 export sits with EQUAL 5mm
  # margins on all four sides (no distortion). Panels are 3390/3 wide x 2362 tall.
  background_color: "#FFFFFF"

# Olive gold — same color as the wedding-invite module to match the suite.
text_color: "#9C7E3E"

fold:
  type: "sanfona"
  panel_order:
    - back_cover
    - middle
    - front_cover
  guides_vertical_pct:
    - 33.3333
    - 66.6666

borders:
  stroke_width_px: 2
  inner_margin_px: 118
  color: "#9C7E3E"
  raster: true
  as_paths: true

fonts:
  script:
    family: "Cormorant Garamond Italic"
    fallback: "Georgia Italic"
  script_bold:
    family: "Cormorant Garamond Bold Italic"
    fallback: "Georgia Bold Italic"
  serif:
    family: "Cormorant Garamond Regular"
    fallback: "Georgia"
  bold:
    family: "Cormorant Garamond Bold"
    fallback: "Georgia Bold"

# External side (visible when folded) — front_cover faces out, back_cover wraps.
externo:
  front_cover:                # title + couple subtitle
    title_size_px: 140
    title_top_padding_px: 80
    subtitle_size_px: 100
    subtitle_y_factor: 0.78
  middle:                     # calendar + ceremony info  (+34% text)
    weekday_size_px: 94
    date_size_px: 56
    arrival_size_px: 48
    venue_size_px: 48
    address_size_px: 43
    calendar:
      cell_size_px: 80
      header_size_px: 48
      day_size_px: 54
      highlight_radius_px: 36
      highlight_stroke_px: 3
      weekday_labels: ["S", "M", "T", "W", "T", "F", "S"]   # English Sun-Sat
  back_cover:                 # logo (or empty if no logo asset)
    logo_padding_px: 50

# Internal side (after unfolding) — three panels of content.
interno:
  back_cover:                 # "Your Mission" block  (title kept; body/verse/ref +34%)
    title_size_px: 100
    body_size_px: 51
    body_wrap_chars: 33         # widened with the font so the block keeps its height
    verse_size_px: 54
    verse_wrap_chars: 35
    ref_size_px: 38
  middle:
    # single — madrinha / padrinho: one role title + body + palette + names.
    single:
      role_title_size_px: 140
      body_size_px: 56
      body_wrap_chars: 32       # widened with the font (fewer, wider lines)
      palette_subtitle_size_px: 67
      color_label_size_px: 48
      palette:
        circle_radius_px: 60
        circle_spacing_px: 110  # spread so the +font color labels don't collide
    # split — casal: stacked groomsman + bridesmaid sections. This panel holds
    # TWO paragraphs + TWO palettes, so it can't take the full +34% without the
    # bodies running into the swatches — capped at ~+18% here.
    split:
      overall_title_size_px: 90
      section_title_size_px: 60
      body_size_px: 40
      body_wrap_chars: 47
      color_label_size_px: 36
      overall_title_y_top_offset_px: 30
      groomsman_title_y_factor: 0.19
      groomsman_body_y_factor: 0.30
      groomsman_palette_y_factor: 0.45
      bridesmaid_title_y_factor: 0.56
      bridesmaid_body_y_factor: 0.67
      bridesmaid_palette_y_factor: 0.85
      palette:
        circle_radius_px: 60
        circle_spacing_px: 90
  front_cover:                # tips block ("Tips for the big day")  (body +34%)
    title_size_px: 100
    body_size_px: 56
    icon_size_px: 130

background_image:
  opacity_pct: 18
  scale_mode: "cover"
