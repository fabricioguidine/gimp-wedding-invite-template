# wedding-bridesmaid — text content (English placeholders).
# Shared blocks (couple/date/ceremony/mission/tips) apply to every variant.
# Per-variant cover title + role data live under `variants:`.

couple:
  bride: "Emily"
  groom: "James Thomas"

# Date data — drives the calendar highlight + the date-by-extenso text.
date:
  year: 2026
  month: 10                       # October
  day: 10
  month_name: "October"
  weekday_name: "Sunday"

ceremony:
  arrival_label: "Bridal party arrival"
  arrival_time: "16:30"
  venue: "Our Lady of the Rosary Parish Church"
  address: "123 Sample Avenue, Suite 230"

# Mission block — left panel of the internal side. Same for all variants.
mission:
  title: "Your Mission"           # PT: "Sua Missão"
  body: |
    To pray, to bless, to advise, to walk beside, to encourage,
    to care, to bring joy, to love, and to witness our union and our
    love before God.

    We are sure that He is the one who placed you in our path.

    That is why we are so glad you accepted to be part of one of the
    most important days of our lives.
  verse:
    text: '"And above all these put on love, which binds everything together in perfect harmony."'
    reference: "Colossians 3:14"

# Tips block — right panel of the internal side. Same for all variants.
tips:
  title: "Tips for the big day:"
  items:
    - icon: clock
      text: "Please arrive 30 minutes early. The ceremony is scheduled for 5:30 PM; please be there at 5:00 PM. We cannot afford to be late, okay?"
    - icon: camera
      text: "Take lots of photos and help us treasure this moment forever."
    - icon: glass
      text: "Enjoy yourself to the fullest!"

# Per-variant data. Each variant overrides `cover` and supplies either a single
# `role` (madrinha / padrinho) or a split `roles` block (casal).
variants:
  # madrinha — PT: "Manual das Madrinhas"
  madrinha:
    cover:
      title: "Bridesmaid Manual"
    role:
      title: "Bridesmaid"
      body: "We want you to feel beautiful and confident on this special day. Your presence beside us makes the celebration even more meaningful."
      palette_subtitle: "Color palette - Bridesmaid"
      colors:
        - "#8B0008"
        - "#5C0808"
        - "#2D0606"
      color_names:
        - "Light wine"
        - "Wine"
        - "Dark wine"

  # padrinho — PT: "Manual do Padrinho". Gray suit / white shirt / wine tie.
  padrinho:
    cover:
      title: "Groomsman Manual"
    role:
      title: "Groomsman"
      body: "To look even more elegant, please wear a Medium Gray suit with a White shirt. For a special touch matching our palette, the tie will be Wine. We are counting on you to make this long-awaited day shine!"
      palette_subtitle: "Color palette - Groomsman"
      colors:
        - "#878E99"     # gray suit
        - "#FFFFFF"     # white shirt
        - "#5C0808"     # wine tie
      color_names:
        - "Gray"
        - "White"
        - "Wine"

  # casal — PT: "Manual dos Padrinhos" (when both attend as a couple).
  casal:
    cover:
      title: "Couple Manual"
    roles:
      overall_title: "Couple"
      groomsman:
        title: "Groomsman"
        body: "Please wear a Medium Gray suit with a White shirt. The tie will be Wine to match our palette."
        colors: ["#878E99", "#FFFFFF", "#5C0808"]
        color_names: ["Gray", "White", "Wine"]
      bridesmaid:
        title: "Bridesmaid"
        body: "Please pick a dress in the Wine tone of our palette. Choose any model that makes you feel beautiful."
        colors: ["#8B0008", "#5C0808", "#2D0606"]
        color_names: ["Light wine", "Wine", "Dark wine"]
